title: Replay 2026 Nexus Workshop
teaser: Decouple a Temporal monolith into namespace-isolated services connected by
  a Nexus Endpoint, then layer in async operations, human-in-the-loop updates, lifecycle
  controls, and a polyglot connector demo.
description: A 3.5-hour hands-on workshop introducing Temporal Nexus through a payment
  processing scenario. You will decouple a monolith into Payments and Compliance services
  running in separate namespaces, connect them with a Nexus Endpoint, then layer in
  asynchronous operations, human-in-the-loop updates, lifecycle controls (cancellation,
  errors, circuit breaker), and a polyglot connector demo where the same Service contract
  is fulfilled by a Java handler.
